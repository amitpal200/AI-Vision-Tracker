{% extends "base.html" %}
{% block content %}
<section class="container py-5">
  <div class="dashboard-header">
    <div class="dashboard-heading">
      <h1 class="fw-bold">Analytics Dashboard</h1>
      <p class="text-secondary-emphasis mb-0">Monitor detections, tracker activity, confidence, and runtime speed.</p>
    </div>
    <button class="btn btn-outline-danger" id="clearDashboard" type="button">Clear dashboard</button>
  </div>

  <div class="dashboard-metrics">
    <div class="metric"><span>Total objects</span><strong id="metricTotal">0</strong></div>
    <div class="metric"><span>FPS</span><strong id="metricFps">0</strong></div>
    <div class="metric"><span>Frame time</span><strong id="metricTime">0 ms</strong></div>
    <div class="metric"><span>Accuracy</span><strong id="metricAccuracy">0%</strong></div>
  </div>

  <div class="dashboard-charts">
    <div class="chart-panel chart-panel-wide">
      <div class="panel-title">Objects by class</div>
      <canvas id="classChart"></canvas>
    </div>
    <div class="chart-panel chart-panel-side">
      <div class="panel-title">Live system mix</div>
      <canvas id="systemChart"></canvas>
    </div>
  </div>
</section>
{% endblock %}
