<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | Real-Time Object Detection</title>
  <script>
    document.documentElement.dataset.bsTheme = localStorage.getItem("theme") || "dark";
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top border-bottom app-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('pages.home') }}">AI Vision Tracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbar">
        <ul class="navbar-nav ms-auto gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.home') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.about') }}">About</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.live_camera') }}">Live</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.upload') }}">Upload</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.results') }}">Results</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.dashboard') }}">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('pages.contact') }}">Contact</a></li>
        </ul>
        <button class="btn btn-sm btn-outline-info ms-lg-3" id="themeToggle" type="button">Light mode</button>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="appToast" class="toast align-items-center text-bg-primary border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastText">Ready</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
