{% extends "base.html" %}
{% block content %}
<section class="container py-5">
  <h1 class="fw-bold">Upload Video</h1>
  <p class="text-secondary-emphasis">Choose an MP4, AVI, or MOV file. Processing runs in the background so the web interface stays responsive.</p>
  <form id="uploadForm" class="upload-panel mt-4">
    <label for="videoFile" class="form-label">Video file</label>
    <input class="form-control form-control-lg" type="file" id="videoFile" name="video" accept=".mp4,.avi,.mov" required>
    <button class="btn btn-info btn-lg mt-3" type="submit">Upload and process</button>
  </form>
  <div class="mt-4">
    <div class="progress" role="progressbar">
      <div class="progress-bar progress-bar-striped progress-bar-animated" id="uploadProgress" style="width: 0%">0%</div>
    </div>
    <p class="mt-3" id="uploadStatus">No active job.</p>
  </div>
</section>
{% endblock %}
